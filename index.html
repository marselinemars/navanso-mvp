<style>
/* ===========================================================
   NAVANSO — Design tokens & component styles
   Nous progressons, ensemble.
   =========================================================== */

@import url('https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap');

:root{
  /* Brand — from logo */
  --blue-900:#15306E;
  --blue-800:#1A357E;
  --blue-700:#1E3A8A;   /* primary */
  --blue-600:#2456B5;
  --blue-500:#3568CE;
  --blue-100:#E7EDFA;
  --blue-50:#F2F5FD;

  --green-700:#147A5E;
  --green-600:#1F8A6D;  /* progress */
  --green-500:#27A085;
  --green-100:#E2F3EC;
  --green-50:#EFF9F4;

  --orange-600:#D96C12;
  --orange-500:#EC7A1E;  /* student accent */
  --orange-100:#FCE9D7;
  --orange-50:#FDF4EB;

  /* Neutrals — warm-cool */
  --ink:#16202E;
  --ink-2:#3A4658;
  --muted:#5B6678;
  --faint:#8A94A6;
  --line:#E5E9F0;
  --line-2:#EEF1F6;
  --bg:#F4F6FA;
  --bg-2:#EDF1F7;
  --card:#FFFFFF;
  --white:#FFFFFF;

  /* status */
  --ok:#1F8A6D;
  --warn:#D9A100;
  --alert:#D8632E;

  --r-xl:20px;
  --r-lg:16px;
  --r-md:12px;
  --r-sm:9px;
  --r-pill:999px;

  --sh-1:0 1px 2px rgba(16,24,40,.05);
  --sh-2:0 2px 6px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);
  --sh-3:0 12px 30px -12px rgba(20,38,80,.22), 0 2px 8px rgba(16,24,40,.05);
  --sh-4:0 28px 60px -22px rgba(20,38,80,.30);

  --font-d:'Schibsted Grotesk', system-ui, sans-serif;
  --font-b:'Hanken Grotesk', system-ui, sans-serif;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-b);
  color:var(--ink);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
h1,h2,h3,h4,h5{font-family:var(--font-d);margin:0;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
p{margin:0}
button{font-family:inherit}
a{color:inherit;text-decoration:none}
::selection{background:var(--blue-100)}
.tnum{font-variant-numeric:tabular-nums}

/* ---------- layout helpers ---------- */
.row{display:flex;align-items:center}
.col{display:flex;flex-direction:column}
.between{justify-content:space-between}
.center{align-items:center;justify-content:center}
.wrap{flex-wrap:wrap}
/* When a row wraps, give it a slightly larger row-gap so the second line
   has breathing room. column-gap stays whatever the .gap-* class sets. */
.row.wrap{row-gap:max(10px, var(--row-gap-min, 10px))}
.grow{flex:1}
.gap-2{gap:2px}.gap-4{gap:4px}.gap-6{gap:6px}.gap-7{gap:7px}.gap-8{gap:8px}.gap-10{gap:10px}
.gap-12{gap:12px}.gap-14{gap:14px}.gap-16{gap:16px}.gap-18{gap:18px}.gap-20{gap:20px}.gap-22{gap:22px}.gap-24{gap:24px}.gap-32{gap:32px}
.muted{color:var(--muted)}.faint{color:var(--faint)}
.tcenter{text-align:center}

/* ---------- logo lockup ---------- */
.logo{display:inline-flex;align-items:center;gap:9px;font-family:var(--font-d);font-weight:800;letter-spacing:-.02em;color:var(--blue-700)}
.logo img{display:block;object-fit:contain}
.logo .mark{display:grid;place-items:center;border-radius:9px;overflow:hidden;background:#fff}
.logo-name{font-size:21px;line-height:1}
.logo-sub{font-size:10.5px;color:var(--green-600);font-weight:600;letter-spacing:.01em;font-family:var(--font-b)}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  border:1px solid transparent;border-radius:var(--r-md);
  font-family:var(--font-b);font-weight:600;font-size:14.5px;line-height:1;
  padding:11px 16px;cursor:pointer;white-space:nowrap;
  transition:transform .08s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease;
}
.btn:active{transform:translateY(1px)}
.btn svg{width:18px;height:18px}
.btn-primary{background:var(--blue-700);color:#fff;box-shadow:var(--sh-1)}
.btn-primary:hover{background:var(--blue-800)}
.btn-green{background:var(--green-600);color:#fff;box-shadow:var(--sh-1)}
.btn-green:hover{background:var(--green-700)}
.btn-orange{background:var(--orange-500);color:#fff;box-shadow:var(--sh-1)}
.btn-orange:hover{background:var(--orange-600)}
.btn-ghost{background:#fff;color:var(--ink);border-color:var(--line)}
.btn-ghost:hover{background:var(--bg);border-color:#d7dde7}
.btn-soft{background:var(--blue-50);color:var(--blue-700);border-color:transparent}
.btn-soft:hover{background:var(--blue-100)}
.btn-wa{background:#1FA855;color:#fff}
.btn-wa:hover{background:#178a45}
.btn-lg{padding:14px 22px;font-size:16px;border-radius:13px}
.btn-sm{padding:8px 12px;font-size:13px;border-radius:9px}
.btn-sm svg{width:16px;height:16px}
.btn-block{width:100%}
.btn-icon{padding:9px;border-radius:10px}
.btn-icon svg{width:18px;height:18px}

/* ---------- cards ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--sh-2)}
.card-flat{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg)}
.pad-16{padding:16px}.pad-20{padding:20px}.pad-24{padding:24px}.pad-28{padding:28px}

/* ---------- chips / tags / badges ---------- */
.chip{display:inline-flex;align-items:center;gap:6px;border-radius:var(--r-pill);
  padding:5px 11px;font-size:12.5px;font-weight:600;line-height:1;white-space:nowrap}
.chip svg{width:13px;height:13px}
.chip-blue{background:var(--blue-50);color:var(--blue-700)}
.chip-green{background:var(--green-50);color:var(--green-700)}
.chip-orange{background:var(--orange-50);color:var(--orange-600)}
.chip-gray{background:var(--bg-2);color:var(--ink-2)}
.chip-line{background:#fff;border:1px solid var(--line);color:var(--ink-2)}
.chip-weak{background:var(--orange-50);color:var(--orange-600);border:1px solid var(--orange-100)}

.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;
  padding:4px 9px;border-radius:7px;letter-spacing:.01em;white-space:nowrap}
.badge-verified{background:var(--green-50);color:var(--green-700)}
.badge-pending{background:#FBF3D8;color:#9A7400}
.badge-new{background:var(--blue-50);color:var(--blue-700)}

/* places pill — emphasised brand element */
.places{display:inline-flex;align-items:center;gap:7px;border-radius:var(--r-pill);
  padding:6px 13px;font-weight:700;font-size:13px;line-height:1;white-space:nowrap}
.places .dot{width:7px;height:7px;border-radius:50%}
.places-open{background:var(--green-50);color:var(--green-700)}
.places-open .dot{background:var(--green-500)}
.places-low{background:var(--orange-50);color:var(--orange-600)}
.places-low .dot{background:var(--orange-500);box-shadow:0 0 0 3px var(--orange-100)}
.places-full{background:var(--bg-2);color:var(--muted)}
.places-full .dot{background:var(--faint)}

/* capacity meter */
.cap{height:8px;border-radius:99px;background:var(--bg-2);overflow:hidden;display:flex;gap:2px;padding:0}
.cap i{display:block;height:100%;border-radius:99px}
.seatrow{display:flex;gap:5px}
.seat{width:13px;height:13px;border-radius:4px;background:var(--bg-2)}
.seat.filled{background:var(--blue-600)}
.seat.open{background:var(--green-100);box-shadow:inset 0 0 0 1.5px var(--green-500)}

/* progress bar */
.bar{height:9px;border-radius:99px;background:var(--bg-2);overflow:hidden}
.bar i{display:block;height:100%;border-radius:99px;background:var(--green-500)}
.bar.blue i{background:var(--blue-600)}
.bar.orange i{background:var(--orange-500)}

/* ---------- avatars ---------- */
.av{display:grid;place-items:center;border-radius:50%;font-family:var(--font-d);
  font-weight:700;color:#fff;flex:none;letter-spacing:.01em}
.av-b{background:linear-gradient(135deg,var(--blue-600),var(--blue-800))}
.av-g{background:linear-gradient(135deg,var(--green-500),var(--green-700))}
.av-o{background:linear-gradient(135deg,var(--orange-500),var(--orange-600))}
.av-ring{box-shadow:0 0 0 3px #fff, 0 0 0 4px var(--line)}

/* ---------- stat ---------- */
.stat-num{font-family:var(--font-d);font-weight:700;letter-spacing:-.02em;line-height:1}
.kpi{display:flex;flex-direction:column;gap:10px;padding:18px;border-radius:var(--r-lg);
  background:#fff;border:1px solid var(--line)}
.kpi .icn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center}

/* ---------- forms ---------- */
.field{display:flex;flex-direction:column;gap:7px}
.label{font-size:13px;font-weight:600;color:var(--ink-2)}
.input,.select,.textarea{
  font-family:var(--font-b);font-size:14.5px;color:var(--ink);background:#fff;
  border:1px solid var(--line);border-radius:var(--r-md);padding:11px 13px;width:100%;
  transition:border-color .15s, box-shadow .15s;
}
.input::placeholder,.textarea::placeholder{color:var(--faint)}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--blue-500);
  box-shadow:0 0 0 3px var(--blue-100)}
.textarea{resize:vertical;min-height:84px;line-height:1.5}
.input-icon{position:relative}
.input-icon svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--faint)}
.input-icon .input{padding-left:40px}

/* segmented / toggle chips */
.seg{display:inline-flex;background:var(--bg-2);border-radius:11px;padding:4px;gap:3px}
.seg button{border:none;background:transparent;border-radius:8px;padding:8px 14px;font-family:var(--font-b);
  font-weight:600;font-size:13.5px;color:var(--muted);cursor:pointer;transition:.12s}
.seg button.on{background:#fff;color:var(--blue-700);box-shadow:var(--sh-1)}

.pick{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;
  border-radius:var(--r-pill);padding:8px 13px;font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:.12s}
.pick:hover{border-color:#cfd6e2}
.pick.on{background:var(--blue-700);border-color:var(--blue-700);color:#fff}
.pick.on.g{background:var(--green-600);border-color:var(--green-600)}

/* ---------- tables ---------- */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--faint);padding:11px 14px;border-bottom:1px solid var(--line)}
.tbl td{padding:13px 14px;border-bottom:1px solid var(--line-2);font-size:14px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .12s}
.tbl tbody tr:hover{background:var(--blue-50)}

/* ---------- divider ---------- */
.hr{height:1px;background:var(--line);border:none;margin:0}
.dot-sep{width:3px;height:3px;border-radius:50%;background:var(--faint);display:inline-block}

/* ---------- section eyebrow ---------- */
.eyebrow{font-size:12.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green-600)}

/* ---------- striped placeholder ---------- */
.ph{background:
   repeating-linear-gradient(135deg,#eef1f7 0 10px,#e7ebf3 10px 20px);
  border:1px dashed #cdd5e2;border-radius:var(--r-md);display:grid;place-items:center;
  color:#9aa3b4;font-family:ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.02em;text-align:center}

/* =========================================================
   APP SHELL (tutor workspace)
   ========================================================= */
.shell{display:grid;grid-template-columns:248px 1fr;min-height:100%;background:var(--bg)}
.side{background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px;gap:4px;position:sticky;top:0;height:100vh}
.side .nav-l{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);padding:14px 12px 6px}
.nav-i{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--ink-2);
  font-weight:600;font-size:14px;cursor:pointer;transition:.12s}
.nav-i svg{width:19px;height:19px;color:var(--faint);transition:.12s}
.nav-i:hover{background:var(--bg)}
.nav-i.on{background:var(--blue-50);color:var(--blue-700)}
.nav-i.on svg{color:var(--blue-700)}
.nav-i .tag{margin-left:auto;background:var(--orange-500);color:#fff;font-size:11px;font-weight:700;
  border-radius:99px;padding:2px 7px;min-width:20px;text-align:center}
.topbar{height:64px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:16px;padding:0 28px;position:sticky;top:0;z-index:20}
.main{display:flex;flex-direction:column;min-width:0}
.content{padding:28px;max-width:1180px;width:100%;margin:0 auto}

/* =========================================================
   MARKETING NAV
   ========================================================= */
.mnav{height:70px;display:flex;align-items:center;gap:24px;padding:0 40px;background:rgba(255,255,255,.8);position:sticky;top:0;z-index:50;
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
.mnav a.link{font-size:14.5px;font-weight:600;color:var(--ink-2);padding:8px 4px;cursor:pointer}
.mnav a.link:hover{color:var(--blue-700)}

/* =========================================================
   PHONE FRAME
   ========================================================= */
.phone{width:390px;max-width:100%;background:#0e1726;border-radius:46px;padding:13px;box-shadow:var(--sh-4);flex:none}
.phone-screen{background:var(--bg);border-radius:34px;overflow:hidden;position:relative;height:780px;display:flex;flex-direction:column}
/* Marketing / parent-facing screens collapse at a higher threshold (860px)
   than the tutor shell (640px) because phones and narrow windows are the
   natural viewport for them. */
@media (max-width: 860px){
  .phone{width:100%;border-radius:24px;padding:8px;box-shadow:none}
  .phone-screen{border-radius:18px;height:calc(100vh - 80px);min-height:560px}
  .phone-notch{display:none}
  .phone-status{display:none}
  /* Marketing sections: shrink the inline 40px horizontal padding pattern. */
  .screen-anim > div[style*="padding"]{padding-left:16px !important;padding-right:16px !important}
  .mnav{padding:0 16px !important;height:60px}
  .screen-anim[style*="radial-gradient"] > div:first-child{padding:14px 16px !important}
}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:128px;height:30px;background:#0e1726;border-radius:0 0 18px 18px;z-index:40}
.phone-status{height:46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 8px;font-size:13px;font-weight:700;color:var(--ink);flex:none}
.phone-body{flex:1;overflow-y:auto}
.phone-body::-webkit-scrollbar{width:0}

/* scrollbars */
.scroll::-webkit-scrollbar{width:10px;height:10px}
.scroll::-webkit-scrollbar-thumb{background:#d3dae4;border-radius:99px;border:3px solid var(--bg)}
.scroll::-webkit-scrollbar-track{background:transparent}

/* fade-in for screen transitions */
@keyframes fadeUp{from{transform:translateY(7px)}to{transform:none}}
.screen-anim{animation:fadeUp .24s ease}

/* toasts */
#nav-toasts{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);z-index:300;
  display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.nav-toast{display:flex;align-items:center;gap:11px;background:var(--ink);color:#fff;
  padding:12px 18px 12px 13px;border-radius:13px;box-shadow:var(--sh-4);font-weight:600;font-size:14px;
  animation:toastIn .26s cubic-bezier(.2,.8,.3,1)}
.nav-toast.out{animation:toastOut .25s ease forwards}
.nav-toast .nt-dot{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;flex:none;color:#fff}
.nav-toast-green .nt-dot{background:var(--green-500)}
.nav-toast-blue .nt-dot{background:var(--blue-500)}
.nav-toast-orange .nt-dot{background:var(--orange-500)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px)}}

/* utility text sizes */
.t-12{font-size:12px}.t-13{font-size:13px}.t-14{font-size:14px}.t-15{font-size:15px}
.t-16{font-size:16px}.t-18{font-size:18px}.t-20{font-size:20px}.t-22{font-size:22px}
.t-26{font-size:26px}.t-32{font-size:32px}.t-40{font-size:40px}
.w-500{font-weight:500}.w-600{font-weight:600}.w-700{font-weight:700}.w-800{font-weight:800}
.lh-15{line-height:1.5}.lh-14{line-height:1.4}

/* ============ PROTOTYPE SCOPE LABELS ============ */
/* "Fonctionnalité future" — dashed slate pill for marketplace-like elements */
.scope{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;
  line-height:1;white-space:nowrap;border-radius:99px;padding:4px 9px;letter-spacing:.01em}
.scope svg{width:12px;height:12px}
.scope-future{background:repeating-linear-gradient(135deg,#EEF1F7,#EEF1F7 6px,#E7EBF3 6px,#E7EBF3 12px);
  color:var(--muted);border:1px dashed #C3CCDA}
.scope-demo{background:var(--bg-2);color:var(--faint);border:1px solid var(--line)}
.scope-demo .dot{width:6px;height:6px;border-radius:50%;background:var(--faint)}

/* privacy reassurance strip */
.privacy{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:11px;
  background:var(--green-50);border:1px solid var(--green-100)}
.privacy svg{color:var(--green-700);flex:none}
.privacy span{font-size:12.5px;font-weight:600;color:var(--green-800,var(--green-700));line-height:1.35}

/* time-saving microcopy note */
.timesave{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;
  background:var(--blue-50);border:1px solid var(--blue-100)}
.timesave svg{color:var(--blue-700);flex:none}
.timesave span{font-size:12.5px;font-weight:600;color:var(--blue-800,var(--blue-700));line-height:1.35}

/* persistent prototype ribbon (fixed, bottom-left) */
.proto-pill{position:fixed;left:18px;bottom:20px;z-index:80;display:flex;align-items:center;gap:8px;
  background:rgba(22,32,46,.92);color:#fff;border-radius:99px;padding:8px 14px;
  box-shadow:var(--sh-3);backdrop-filter:blur(6px)}
.proto-pill .pdot{width:7px;height:7px;border-radius:50%;background:var(--orange-500);
  box-shadow:0 0 0 3px rgba(236,122,30,.3);flex:none}
.proto-pill span{font-size:12px;font-weight:600;letter-spacing:.01em;white-space:nowrap}
.proto-pill .sub{opacity:.6;font-weight:500}

/* before / after comparison block */
.cmp{border-radius:18px;overflow:hidden;border:1px solid var(--line)}
.cmp-col{padding:22px 24px}
.cmp-before{background:var(--bg-2)}
.cmp-after{background:linear-gradient(155deg,var(--blue-50),#fff 75%)}
.cmp-row{display:flex;align-items:flex-start;gap:11px;padding:9px 0}
.cmp-row .ci{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;flex:none;margin-top:1px}

/* dominant dashboard action cards */
.qa-card{transition:transform .12s, box-shadow .12s}
.qa-card:hover{transform:translateY(-2px);box-shadow:var(--sh-3)}

/* Pick chip cluster needs breathing room on wrap. Apply slightly larger
   row-gap when the parent wraps, regardless of column gap class. */
.row.wrap > .pick { margin-bottom: 0 }
/* The .seg group of segmented buttons needs vertical padding on wrap too. */
.row.wrap > .seg { margin-bottom: 0 }

/* ============================================================
   NAVANSO HERO — namespaced (.nv-hero / .nvh-*) so it can't
   collide with the rest of the design system. Drop-in design
   from B15.4. Tokens scoped to the section.
   ============================================================ */
.nv-hero{
  --blue-800:#1A357E; --blue-700:#1E3A8A; --blue-600:#2456B5; --blue-50:#F2F5FD;
  --green-700:#147A5E; --green-600:#1F8A6D; --green-500:#27A085; --green-100:#E2F3EC; --green-50:#EFF9F4;
  --orange-600:#D96C12; --orange-500:#EC7A1E; --orange-100:#FCE9D7; --orange-50:#FDF4EB;
  --ink:#16202E; --ink-2:#3A4658; --muted:#5B6678; --faint:#8A94A6;
  --line:#E5E9F0; --line-2:#EEF1F6; --bg:#F4F6FA;
  --sh-1:0 1px 2px rgba(16,24,40,.05);
  --sh-2:0 2px 6px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);
  --sh-3:0 12px 30px -12px rgba(20,38,80,.22), 0 2px 8px rgba(16,24,40,.05);
  position:relative; overflow:hidden; isolation:isolate;
  font-family:var(--font-b); color:var(--ink); background:var(--bg);
  -webkit-font-smoothing:antialiased;
}
.nv-hero *{box-sizing:border-box}
/* Bottom fade so the hero blends into whatever section comes next instead
   of ending on a hard color boundary. Sits above the bg layers, below content. */
.nv-hero::after{content:""; position:absolute; left:0; right:0; bottom:0; height:120px;
  background:linear-gradient(180deg, transparent, var(--bg) 65%, var(--bg)); z-index:1; pointer-events:none}
.nvh-bg{position:absolute; inset:0; pointer-events:none; z-index:0}
.nvh-bg.base{background:linear-gradient(180deg,#fff,var(--bg))}
.nvh-bg.color{background:
  radial-gradient(820px 680px at 2% 24%, rgba(46,168,108,.30), transparent 58%),
  radial-gradient(720px 620px at 96% 78%, rgba(58,118,232,.30), transparent 60%),
  radial-gradient(640px 560px at 50% 8%, rgba(236,122,30,.20), transparent 58%),
  radial-gradient(900px 720px at 74% 52%, rgba(228,236,254,.9), transparent 62%)}
.nvh-bg.aurora{background:
  radial-gradient(420px 380px at 20% 80%, rgba(236,122,30,.20), transparent 60%),
  radial-gradient(460px 420px at 84% 22%, rgba(46,168,108,.18), transparent 62%);
  animation:nvhAurora 18s ease-in-out infinite}
.nvh-inner{position:relative; z-index:2;
  max-width:1280px; margin:0 auto; padding:72px 56px;
  display:grid; grid-template-columns:minmax(0,1fr) minmax(0,560px);
  align-items:center; gap:56px}
.nvh-copy{display:flex; flex-direction:column; gap:24px; max-width:560px}
.nvh-eyebrow{display:inline-flex; align-items:center; gap:6px; align-self:flex-start;
  background:var(--green-50); color:var(--green-700); font-weight:700; font-size:13px; line-height:1;
  border-radius:999px; padding:7px 13px; box-shadow:var(--sh-1)}
.nvh-eyebrow svg{width:14px;height:14px}
.nvh-h1{font-family:var(--font-d); font-weight:800; letter-spacing:-.025em;
  font-size:clamp(34px,4.4vw,56px); line-height:1.04; margin:0}
.nvh-h1 .g{color:var(--green-600)} .nvh-h1 .b{color:var(--blue-700)} .nvh-h1 .o{color:var(--orange-500)}
.nvh-lede{font-size:clamp(16px,1.5vw,19px); line-height:1.55; color:var(--muted); max-width:480px; margin:0}
.nvh-points{display:flex; flex-wrap:wrap; gap:14px 22px}
.nvh-point{display:inline-flex; align-items:center; gap:8px; font-size:14px; font-weight:600; color:var(--muted)}
.nvh-point svg{width:18px;height:18px}
.nvh-cta{display:flex; flex-wrap:wrap; gap:12px; margin-top:4px}
.nvh-btn{display:inline-flex; align-items:center; justify-content:center; gap:9px;
  font-family:var(--font-b); font-weight:600; font-size:16px; line-height:1; cursor:pointer;
  border:1px solid transparent; border-radius:13px; padding:15px 22px; white-space:nowrap;
  transition:transform .08s ease, background .15s ease, border-color .15s ease}
.nvh-btn:active{transform:translateY(1px)}
.nvh-btn svg{width:18px;height:18px}
.nvh-btn.primary{background:var(--blue-700); color:#fff; box-shadow:var(--sh-1)}
.nvh-btn.primary:hover{background:var(--blue-800)}
.nvh-btn.green{background:var(--green-600); color:#fff; box-shadow:var(--sh-1)}
.nvh-btn.green:hover{background:var(--green-700)}
.nvh-btn.ghost{background:#fff; color:var(--ink); border-color:var(--line)}
.nvh-btn.ghost:hover{background:var(--bg); border-color:#d7dde7}
.nvh-orbit{position:relative; width:560px; max-width:100%; aspect-ratio:1/1; margin:0 auto; justify-self:center}
.nvh-glow{position:absolute; left:50%; top:50%; translate:-50% -50%;
  width:75%; aspect-ratio:1/1; border-radius:50%;
  background:radial-gradient(circle, rgba(236,122,30,.32), rgba(236,122,30,0) 66%);
  animation:nvhHalo 3.4s ease-in-out infinite}
.nvh-ring{position:absolute; inset:9.6%; border-radius:50%;
  background:conic-gradient(from -90deg, var(--green-500), var(--orange-500) 40%, var(--blue-600) 78%, var(--green-500));
  -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
          mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
  opacity:.62; animation:nvhSpin 60s linear infinite}
.nvh-ring-dash{position:absolute; inset:1%; border-radius:50%; border:1.5px dashed #DCE4F1;
  animation:nvhSpin 90s linear infinite reverse}
.nvh-bead{position:absolute; inset:9.6%; border-radius:50%; animation:nvhSpin 60s linear infinite}
.nvh-bead i{position:absolute; top:-5px; left:50%; translate:-50% 0; width:10px; height:10px; border-radius:50%;
  background:var(--orange-500); box-shadow:0 0 0 4px var(--orange-100)}
.nvh-center{position:absolute; left:50%; top:50%; translate:-50% -50%; text-align:center}
.nvh-center .disc{position:relative; width:33.5%; min-width:150px; aspect-ratio:1/1; margin:0 auto;
  border-radius:24%; background:#fff; display:grid; place-items:center;
  box-shadow:0 34px 70px -28px rgba(20,38,80,.4), inset 0 0 0 1px var(--line-2)}
.nvh-center .halo{position:absolute; inset:-10px; border-radius:24%; box-shadow:0 0 0 2px var(--orange-100);
  animation:nvhHalo 3.4s ease-in-out infinite}
.nvh-logo{width:78%; height:78%; object-fit:contain; display:block}
/* Brand tagline — sits between the H1 and the lede, in italic green.
   Acts as the brand promise punctuating the headline. */
.nvh-tagline{
  font-family:var(--font-d); font-size:18px; font-weight:600; font-style:italic;
  color:var(--green-700); margin:6px 0 16px;
  letter-spacing:-.005em; line-height:1.2;
}
@media (max-width:960px){ .nvh-tagline{font-size:16px} }

/* "L'élève" — orange accent inline in the lede (matches the orbital bead colour). */
.nvh-eleve{
  color:var(--orange-600); font-weight:700;
}
.nvh-node{position:absolute; animation:nvhFloat 5s ease-in-out infinite}
.nvh-node .nbg{position:absolute; inset:-18px; border-radius:24px; filter:blur(6px)}
.nvh-node .card{position:relative; display:flex; align-items:center; gap:10px;
  background:#fff; border:1px solid var(--line); border-radius:16px; padding:11px 14px; box-shadow:var(--sh-3)}
.nvh-node .ic{width:38px; height:38px; border-radius:11px; display:grid; place-items:center; flex:none}
.nvh-node .ic svg{width:19px;height:19px}
.nvh-node .tx{display:flex; flex-direction:column; gap:1px; white-space:nowrap}
.nvh-node .tx b{font-size:14px; font-weight:700; color:var(--ink)}
.nvh-node .tx span{font-size:12px; color:var(--faint)}
.nvh-node.parent{left:2%; top:16%}
.nvh-node.parent .nbg{background:radial-gradient(circle at 30% 40%, rgba(46,168,108,.35), transparent 70%)}
.nvh-node.parent .ic{background:var(--green-50); color:var(--green-700)}
.nvh-node.teacher{right:0; top:21%; animation-delay:.7s}
.nvh-node.teacher .nbg{background:radial-gradient(circle at 70% 40%, rgba(58,118,232,.35), transparent 70%)}
.nvh-node.teacher .ic{background:var(--blue-50); color:var(--blue-700)}
.nvh-node.report{left:50%; bottom:3%; translate:-50% 0; animation-delay:.35s}
.nvh-node.report .nbg{background:radial-gradient(circle at 50% 60%, rgba(31,168,85,.32), transparent 70%)}
.nvh-node.report .ic{background:#E8F8EE; color:#1FA855}
.nvh-chip{position:absolute; right:12%; bottom:21%; display:inline-flex; align-items:center; gap:6px;
  background:var(--green-50); color:var(--green-700); font-weight:700; font-size:12.5px; line-height:1;
  border-radius:999px; padding:6px 12px; box-shadow:var(--sh-2); white-space:nowrap;
  animation:nvhFloat 5s ease-in-out infinite; animation-delay:1s}
.nvh-chip svg{width:13px;height:13px}
.nvh-up{animation:nvhUp .6s cubic-bezier(.2,.8,.25,1) both}
.nvh-up.d1{animation-delay:.08s} .nvh-up.d2{animation-delay:.16s} .nvh-up.d3{animation-delay:.24s}
.nvh-up.d4{animation-delay:.3s}  .nvh-up.d5{animation-delay:.18s}
@keyframes nvhUp{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}
@keyframes nvhFloat{0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)}}
@keyframes nvhHalo{0%,100%{transform:scale(1); opacity:.9} 50%{transform:scale(1.06); opacity:.5}}
@keyframes nvhSpin{to{transform:rotate(360deg)}}
@keyframes nvhAurora{0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(3%,-2%) scale(1.06)} 66%{transform:translate(-2%,2%) scale(1.03)}}
@media (max-width:960px){
  .nvh-inner{grid-template-columns:1fr; gap:40px; padding:56px 32px; text-align:center}
  .nvh-copy{max-width:none; align-items:center}
  .nvh-lede{margin-inline:auto}
  .nvh-points,.nvh-cta{justify-content:center}
  .nvh-orbit{width:min(460px,86vw)}
}
@media (max-width:520px){
  .nvh-inner{padding:44px 20px}
  .nvh-node .tx span{display:none}
  .nvh-node .card{padding:9px 11px}
}
@media (prefers-reduced-motion:reduce){
  .nvh-up,.nvh-node,.nvh-chip,.nvh-glow,.nvh-halo,.nvh-ring,.nvh-ring-dash,.nvh-bead,.nvh-bg.aurora,.nvh-center .halo{animation:none}
  .nvh-up{opacity:1; transform:none}
}

/* =========================================================
   MOBILE — below 900px the tutor shell collapses.
   - Sidebar becomes a slide-over drawer triggered by a hamburger
   - Topbar trims to title + bell + hamburger
   - Content stacks to single column
   - Per-screen grids collapse via the useIsMobile() hook in JSX
   ========================================================= */
/* The mobile chrome (hamburger, drawer overlay, drawer close X) is
   conditionally RENDERED in React based on isMobile — so on desktop they
   simply aren't in the DOM. We keep these CSS rules as defensive guards
   so accidental render on desktop is invisible. */
.shell-hamburger,.side-close,.side-overlay{display:none}
@media (max-width: 640px){
  .shell{grid-template-columns:1fr;display:block}
  .side{position:fixed;top:0;bottom:0;left:0;width:280px;height:100vh;z-index:120;
    transform:translateX(-100%);transition:transform .22s ease;box-shadow:var(--sh-4)}
  .side.open{transform:translateX(0)}
  .side-overlay{display:block;position:fixed;inset:0;background:rgba(16,24,40,.45);z-index:110;
    opacity:0;pointer-events:none;transition:opacity .2s ease}
  .side-overlay.open{opacity:1;pointer-events:auto}
  .main{width:100%}
  .topbar{height:auto;min-height:56px;padding:10px 14px;gap:8px;flex-wrap:wrap}
  .topbar h1{font-size:18px !important;white-space:normal !important}
  .topbar .input-icon{display:none !important}
  .topbar .crumbs,.topbar .row.gap-6.faint{display:none}
  .topbar > .row:first-child{flex:1 1 auto;min-width:0}
  .topbar .col[style*="gap:2px"] h1{font-size:17px !important}
  .topbar .row.gap-10{flex-wrap:wrap;justify-content:flex-end}
  .topbar .btn{padding:8px 11px;font-size:13px}
  .topbar .btn-icon{padding:7px}
  .topbar .btn-icon svg{width:17px;height:17px}
  .content{padding:14px 14px 60px}
  .shell-hamburger{display:inline-flex !important;flex:none;align-self:flex-start}
  .side-close{display:flex !important;justify-content:flex-end;padding:4px 0 6px}
  .side-close button{border:none;background:transparent;cursor:pointer;padding:8px;color:var(--muted)}
  .tbl thead{display:none}
  .tbl tr{display:grid;grid-template-columns:1fr;gap:2px;padding:10px 0;border-bottom:1px solid var(--line-2)}
  .tbl td{padding:3px 14px}
  .tbl td:first-child{padding-top:8px}
  .phone{margin:0 auto}
}

/* =========================================================
   B22 — Arabic (RTL) layer.
   Activated automatically when <html dir="rtl">. Uses Tajawal
   for readable Arabic typography (Latin glyphs fall through to
   Inter via fallback). Flips arrow icons and selected layouts.
   ========================================================= */
[dir="rtl"] body,
[dir="rtl"] .mnav,
[dir="rtl"] .topbar,
[dir="rtl"] h1, [dir="rtl"] h2, [dir="rtl"] h3,
[dir="rtl"] .nvh-h1, [dir="rtl"] .nvh-lede, [dir="rtl"] .nvh-tagline,
[dir="rtl"] .nvh-eyebrow, [dir="rtl"] .nvh-node .card,
[dir="rtl"] .input, [dir="rtl"] .textarea, [dir="rtl"] .select,
[dir="rtl"] .btn, [dir="rtl"] .chip, [dir="rtl"] .badge,
[dir="rtl"] .card, [dir="rtl"] .label, [dir="rtl"] .eyebrow,
[dir="rtl"] .nav-i, [dir="rtl"] .nav-l,
[dir="rtl"] p, [dir="rtl"] span, [dir="rtl"] a, [dir="rtl"] button{
  font-family:'Tajawal','Inter',system-ui,sans-serif;
}
[dir="rtl"]{
  /* Arabic reads slightly larger at the same point size; nudge defaults */
  font-feature-settings:"liga","kern";
}

/* Mirror common chevron / arrow icons. We keep the SVG markup the same and
   just rotate the rendered icon when in RTL. */
[dir="rtl"] .icon-flip,
[dir="rtl"] svg[data-arrow],
[dir="rtl"] .btn .ic-arrow,
[dir="rtl"] [class*="-arrowl"] svg,
[dir="rtl"] [class*="-arrow"]:not([class*="-arrowl"]) svg{
  transform:scaleX(-1);
}

/* Language toggle pill (used in MarketingNav + walkthrough topbar) */
.lang-seg{
  display:inline-flex; background:var(--line-2); border:1px solid var(--line);
  border-radius:99px; padding:3px;
}
.lang-seg button{
  background:transparent; color:var(--muted); border:0; cursor:pointer;
  padding:5px 11px; font-size:12.5px; font-weight:700; border-radius:99px;
  font-family:inherit; transition:.15s ease;
  min-width:28px; text-align:center;
}
.lang-seg button.on{background:var(--blue-700); color:#fff}
.lang-seg button:hover:not(.on){background:rgba(0,0,0,.04); color:var(--ink)}
.lang-seg button[data-lang="ar"]{font-family:'Tajawal','Inter',sans-serif; font-size:14px}

/* Dark variant for the walkthrough topbar */
.topbar-dark .lang-seg{background:#162033; border-color:#243049}
.topbar-dark .lang-seg button{color:#A8B2C6}
.topbar-dark .lang-seg button.on{background:linear-gradient(135deg,#3A76E8,#2456B5); color:#fff}
.topbar-dark .lang-seg button:hover:not(.on){background:rgba(255,255,255,.05); color:#fff}

/* Partial-translation badge for screens not yet localised */
.nv-lang-partial{
  position:sticky; top:0; z-index:50;
  background:linear-gradient(90deg,var(--orange-50),#fff);
  border-bottom:1px solid var(--orange-100);
  padding:8px 16px; text-align:center;
  font-size:12.5px; color:var(--orange-600); font-weight:600;
  font-family:'Tajawal','Inter',sans-serif;
}

  const [m, setM] = React.useState(() => typeof window !== 'undefined' && window.innerWidth < 820);
  React.useEffect(() => {
    const f = () => setM(window.innerWidth < 820);
    window.addEventListener('resize', f);
    return () => window.removeEventListener('resize', f);
  }, []);
  return m;
}

    window.addEventListener('resize', f);
    return () => window.removeEventListener('resize', f);
  }, []);

}

const NAV_KEYWORDS = [{
  re: /sign/i,
  label: 'Règles de signes'
}, {
  re: /fraction/i,
  label: 'Fractions'
}, {
  re: /énonc|probl|traduire|traduction/i,
  label: 'Traduction des énoncés'
}, {
  re: /équation/i,
  label: 'Équations'
}, {
  re: /distrait|concentr|attention|focus|bavard/i,
  label: 'Concentration'
}, {
  re: /lecture|lit\b|écrit|orthograph/i,
  label: 'Lecture / écriture'
}, {
  re: /géométr|figure|angle/i,
  label: 'Géométrie'
}, {
  re: /calcul|opérat/i,
  label: 'Calcul'
}];
function analyzeRemarks(sid) {
  const remarks = NavStore.get().remarks[sid] || [];
  const found = {};
  remarks.forEach(r => {
    const hay = (r.text || '') + ' ' + (r.flags || []).join(' ');
    NAV_KEYWORDS.forEach(k => {
      if (k.re.test(hay)) found[k.label] = (found[k.label] || 0) + 1;
    });
    (r.flags || []).forEach(f => {
      if (!NAV_KEYWORDS.some(k => k.label === f)) found[f] = (found[f] || 0) + 1;
    });
  });
  NavStore.set(d => {
    const ex = d.points[sid] || [];
    const byLabel = Object.fromEntries(ex.map(p => [p.label, p]));
    Object.entries(found).forEach(([label, n]) => {
      if (byLabel[label]) {
        byLabel[label].mentions = n;
      } else ex.push({
        id: 'p' + Date.now() + Math.random().toString(36).slice(2, 5),
        label,
        status: 'active',
        since: 'récent',
        mentions: n
      });
    });
    d.points[sid] = ex;
    return d;
  });
}

function upsertParent({

// Parse a group.schedule string ("Samedi & Mardi · 16h–17h30") for French day
// names → array of day-of-week indices (0=Sun … 6=Sat).
const _FR_DAYS = {
  dimanche: 0,
  lundi: 1,
  mardi: 2,
  mercredi: 3,
  jeudi: 4,
  vendredi: 5,
  samedi: 6
};
function parseScheduleDays(schedule) {
  const s = (schedule || '').toLowerCase();
  const out = [];
  Object.entries(_FR_DAYS).forEach(([name, n]) => {
    if (s.includes(name)) out.push(n);
  });
  return out.sort();
}
// Generate `weeks` weeks of planned sessions matching the group's schedule pattern.
// Skips dates that already have a session for this group. Returns the count created.
function generateRecurringSessions(gid, weeks) {
  weeks = weeks || 4;
  const g = groupById(gid);
  if (!g) return 0;
  const days = parseScheduleDays(g.schedule);
  if (days.length === 0) return -1; // sentinel: no parseable pattern
  const existing = sessionsByGroup(gid);
  const existingDates = new Set(existing.map(s => (s.date || '').slice(0, 10)));
  // anchor: latest existing session date, else demo "today"
  const latestIso = existing.length ? existing[0].date || '2026-05-22' : '2026-05-22';
  const anchor = new Date(latestIso);
  // walk weeks from anchor's week's Sunday
  const sunday = new Date(anchor);
  sunday.setDate(sunday.getDate() - sunday.getDay());
  sunday.setHours(0, 0, 0, 0);
  const created = [];
  for (let w = 0; w < weeks; w++) {
    days.forEach(dow => {
      const d = new Date(sunday);
      d.setDate(d.getDate() + w * 7 + dow);
      if (d <= anchor) return;
      const iso = d.toISOString().slice(0, 10);
      if (existingDates.has(iso)) return;
      existingDates.add(iso);
      created.push({
        id: 'sess' + Date.now() + '_' + w + '_' + dow,
        groupId: gid,
        date: iso,
        status: 'planned',
        plannedTopic: 'À définir',
        plannedItems: [],
        comments: '',
        homework: '',
        todos: [],
        attendance: []
      });
    });
  }
  if (created.length) {
    NavStore.set(d => {
      const list = d.sessions || JSON.parse(JSON.stringify(NAV.sessions));
      d.sessions = [...list, ...created];
      return d;
    });
  }
  return created.length;
}

// PROGRESS — numeric score trend across a student's validated reports ----
function _parseScore(str) {
  const s = String(str || '');
  const m = s.match(/(\d+(?:[.,]\d+)?)\s*\/\s*(\d+)/);
  if (m) return {
    val: parseFloat(m[1].replace(',', '.')),
    max: parseFloat(m[2])
  };
  const n = parseFloat(s.replace(',', '.'));
  return isNaN(n) ? null : {
    val: n,
    max: 20
  };
}
function scoreTrendForStudent(sid, tutorId) {
  return reportsByStudent(sid, tutorId).filter(r => r.status !== 'draft').sort((a, b) => (a.date || '').localeCompare(b.date || '')).map(r => {
    const sc = _parseScore(r.summary?.result);
    return sc ? {
      date: r.date,
      val: sc.val,
      max: sc.max,
      token: r.token
    } : null;
  }).filter(Boolean);
}
// Attendance history for a student: one entry per completed session of their group.
function attendanceHistoryForStudent(sid) {
  const s = studentById(sid);
  if (!s) return [];
  return sessionsByGroup(s.groupId).filter(x => x.status === 'completed').map(sess => {

    return {
      date: sess.date,
      topic: sess.plannedTopic || '',
      status: a ? a.status : 'present',
      score: a ? a.score : null
    };

  } catch (e) {

function markParentBellSeen(pid) {

function notificationsForParent(pid) {
  const isAr = window.NavI18n?.lang === 'ar';
  const tx = v => isAr && window.txData ? window.txData(v) : v;
  const seen = parentBellSeenAt(pid);
  const items = [];
  // 1) New validated reports for this parent's children
  reportsByParent(pid).forEach(r => {
    const child = studentById(r.studentId) || {};
    items.push({
      id: 'pn-rep-' + r.id,
      kind: 'report',
      label: isAr ? `تقرير جديد · ${child.name || ''}` : `Nouveau rapport · ${child.name || ''}`,
      sub: r.summary?.topic ? tx(r.summary.topic) : '',
      ts: (r.date || '') + 'T08:00:00Z',
      unread: (r.date || '') + 'T08:00:00Z' > seen && !r.viewedAt,
      screen: 'parent-report',
      param: r.token
    });
  });
  // 2) Tutor replies the parent hasn't opened (outbound, still 'sent')
  threadsByParent(pid).forEach(th => {
    messagesOfThread(th.id).filter(m => m.direction === 'out' && m.status === 'sent').forEach(m => {
      items.push({
        id: 'pn-msg-' + m.id,
        kind: 'message',
        label: isAr ? 'رسالة من الأستاذة' : 'Message de l\'enseignante',
        sub: tx(m.text || '').slice(0, 70),
        ts: m.createdAt,
        unread: (m.createdAt || '') > seen,
        screen: 'parent-thread',
        param: th.id
      });
    });
  });
  // 3) Payment due this month (pending/overdue/missing)
  studentsByParent(pid).forEach(s => {
    const ps = paymentStatusFor(s.id);
    if (ps.status !== 'paid' && !ps.declaredByParent) {
      const due = ps.status === 'overdue';
      const pts = currentMonth() + '-01T00:00:00Z';
      items.push({
        id: 'pn-pay-' + s.id,
        kind: 'payment',
        label: isAr ? `دفع الشّهر · ${s.name}` : `Paiement du mois · ${s.name}`,
        sub: due ? isAr ? 'متأخّر' : 'En retard' : isAr ? 'à régler' : 'à régler',
        ts: pts,
        unread: pts > seen,
        screen: 'parent-home',
        param: pid
      });
    }
  });
  items.sort((a, b) => (b.ts || '').localeCompare(a.ts || ''));
  return {
    items,
    unread: items.filter(x => x.unread).length
  };
}

// not persistent state. Pending reports + unread message counts already
// live in the sidebar badges; the bell surfaces "what's new for me".
const _BELL_KEY = 'nav_bell_seen';
function bellSeenAt() {

    return localStorage.getItem(_BELL_KEY) || '2026-01-01T00:00:00Z';
  } catch (e) {
    return '2026-01-01T00:00:00Z';
  }
}
function markBellSeen() {
  try {

  window.dispatchEvent(new Event('nav-bell-seen'));
}

// Returns {events, ongoing}. `events` are the new-since-last-open items the
// badge counts; `ongoing` are action items always worth surfacing.
function notificationsForTutor() {
  const seen = bellSeenAt();
  const events = [];
  const ongoing = [];
  const isAr = window.NavI18n?.lang === 'ar';
  const tx = v => isAr && window.txData ? window.txData(v) : v;

  // 1) New unread inbound messages (parent → tutor) since last bell open
  messagesAll().forEach(m => {
    if (m.direction !== 'in' || m.status === 'read') return;
    if ((m.createdAt || '') <= seen) return; // already seen
    const t = threadById(m.threadId);
    if (!t) return;
    if ((t.tutorId || 't1') !== 't1') return; // only the logged-in tutor's (t1) threads belong in her bell
    const who = (parentById(t.parentId) || {}).name || 'Parent';
    const aboutChild = t.studentId ? (studentById(t.studentId) || {}).name : (t.prospectiveStudent || {}).name || '';
    const isInquiry = t.kind === 'inquiry';
    events.push({
      id: 'n-msg-' + m.id,
      kind: isInquiry ? 'inquiry' : 'message',
      label: isInquiry ? isAr ? `طلب جديد من ${who}` : `Nouvelle demande de ${who}` : isAr ? `${who} كتب لك` : `${who} a écrit`,
      sub: aboutChild ? isAr ? `بخصوص ${aboutChild}` : `Au sujet de ${aboutChild}` : '',
      excerpt: tx(m.text || '').slice(0, 80),
      at: m.createdAt,
      screen: 'thread',
      param: t.id,
      tone: isInquiry ? 'orange' : 'blue'
    });
  });

  // 2) Parents who opened a report since last bell open
  reportsAll().forEach(r => {
    if ((r.tutorId || 't1') !== 't1') return;
    if (!r.viewedAt) return;
    if ((r.viewedAt || '') <= seen) return;
    const s = studentById(r.studentId) || {};
    events.push({
      id: 'n-vu-' + r.id,
      kind: 'report-viewed',
      label: `${s.name || (isAr ? 'الوالد' : 'Le parent')} · ${isAr ? 'تقرير مفتوح' : 'rapport ouvert'}`,
      sub: isAr ? `اطّلع الوالد على تقرير ${r.date || ''}` : `Le parent a consulté le rapport du ${r.date || ''}`,
      at: r.viewedAt,
      screen: 'parent-report',
      param: r.token,
      tone: 'green'
    });
  });

  // 2b) Parents who explicitly acknowledged a report since last bell open
  reportsAll().forEach(r => {
    if ((r.tutorId || 't1') !== 't1') return;
    if (!r.acknowledgedAt) return;
    if ((r.acknowledgedAt || '') <= seen) return;
    const s = studentById(r.studentId) || {};
    const parent = parentOfStudent(s.id);
    events.push({
      id: 'n-ack-' + r.id,
      kind: 'report-ack',
      label: `${(parent || {}).name || (isAr ? 'الوالد' : 'Le parent')} · ${isAr ? 'تأكيد الاستلام' : 'accusé de réception'}`,
      sub: isAr ? `أكّد قراءة تقرير ${s.name || ''}` : `A confirmé la lecture du rapport de ${s.name || ''}`,
      at: r.acknowledgedAt,
      screen: 'parent-report',
      param: r.token,
      tone: 'green'
    });
  });

  // 3) Sessions starting within the next 24h (newish — show on the day-of)
  const today = todayDate ? todayDate() : new Date();
  groupsAll().forEach(g => {
    const next = nextPlannedSession(g.id);
    if (!next || !next.date) return;
    const sd = new Date(next.date);
    if (isNaN(sd)) return;
    const diff = (sd.getTime() - today.getTime()) / 86400000;
    if (diff >= 0 && diff <= 1) {
      events.push({
        id: 'n-sess-' + next.id,
        kind: 'next-session',
        label: `${isAr ? 'حصّة اليوم' : "Séance aujourd'hui"} · ${g.name}`,
        sub: `${tx(next.plannedTopic || 'Programme à préparer')}`,
        at: next.date,
        screen: 'session-entry',
        param: next.id,
        tone: 'green'
      });
    }
  });

  // 4) Ongoing action items — always shown but NOT counted in the badge
  reportsPending().forEach(r => {
    const s = studentById(r.studentId) || {};
    ongoing.push({
      id: 'n-rep-' + r.id,
      kind: 'report-pending',
      label: `${isAr ? 'تقرير للإرسال' : 'Rapport à envoyer'} · ${s.name || ''}`,
      sub: isAr ? 'البيانات مُجمّعة، جاهزة للمصادقة.' : 'Données collectées, prêt à valider.',
      at: null,
      screen: 'report-gen',
      param: r.studentId,
      tone: 'orange'
    });
  });

  // Parent-declared payments awaiting tutor confirmation (always-on action item)
  paymentsAll().forEach(p => {
    if (!p.declaredByParent || p.status === 'paid') return;
    const st = studentById(p.studentId) || {};
    ongoing.push({
      id: 'n-paydecl-' + p.id,
      kind: 'payment-declared',
      label: isAr ? `دفع مُبلَّغ · ${st.name || ''}` : `Paiement signalé · ${st.name || ''}`,
      sub: isAr ? 'الوالد أبلغ عن الدّفع — للتّأكيد' : 'Le parent a signalé un paiement — à confirmer',
      at: null,
      screen: 'payments',
      param: null,
      tone: 'blue'
    });
  });
  // sort events newest first
  events.sort((a, b) => (b.at || '').localeCompare(a.at || ''));
  return {
    events,
    ongoing,
    seenAt: seen
  };
}

window.parseHash = function () {
  const h = (location.hash || '').replace(/^#/, '');
  const [screen, ...rest] = h.split('/');
  const param = rest.join('/') || null;
  return {
    screen: screen || '',
    param
  };
};

const NavI18n = {
  lang: localStorage.getItem('nv_lang') === 'ar' ? 'ar' : 'fr',

  subscribers: new Set()
};
function t(key, vars) {
  const dict = NAV_STRINGS[NavI18n.lang] || NAV_STRINGS.fr;
  let str = dict[key];
  if (str === undefined) str = NAV_STRINGS.fr[key];
  if (str === undefined) str = key;
  if (!vars) return str;
  return Object.keys(vars).reduce((s, k) => s.replace(new RegExp('\\{' + k + '\\}', 'g'), vars[k]), str);
}
function setLang(lang) {
  if (lang !== 'fr' && lang !== 'ar') return;
  if (NavI18n.lang === lang) return;
  NavI18n.lang = lang;
  localStorage.setItem('nv_lang', lang);
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = lang;
  window.dispatchEvent(new CustomEvent('nv-lang', {
    detail: lang
  }));
}
function getLang() {
  return NavI18n.lang;
}
function useLang() {
  const [lang, setStateLang] = React.useState(NavI18n.lang);
  React.useEffect(() => {
    const fn = e => setStateLang(e.detail || NavI18n.lang);
    window.addEventListener('nv-lang', fn);
    return () => window.removeEventListener('nv-lang', fn);
  }, []);
  return [lang, setLang];
}

/* txData: translate a known FR string to AR if NavI18n.lang==='ar'; else return as-is.
   Also normalizes curly apostrophes so seed strings match. */
function txData(s) {
  if (s == null) return s;
  if (NavI18n.lang !== 'ar') return s;
  if (NAV_DATA_AR[s] !== undefined) return NAV_DATA_AR[s];
  // try with normalized apostrophes
  const norm = String(s).replace(/[’‘]/g, "'");
  if (NAV_DATA_AR[norm] !== undefined) return NAV_DATA_AR[norm];
  return s;
}

/* fmt date with Algerian Arabic months when in AR mode */
const NAV_AR_MONTHS_SHORT = ['', 'جانفي', 'فيفري', 'مارس', 'أفريل', 'ماي', 'جوان', 'جويلية', 'أوت', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
function fmtDateLoc(iso) {
  if (!iso) return '';
  // try YYYY-MM-DD
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso);
  if (m && NavI18n.lang === 'ar') {
    return `${parseInt(m[3], 10)} ${NAV_AR_MONTHS_SHORT[parseInt(m[2], 10)]} ${m[1]}`;
  }
  // Already a French short date like "18 mai" → translate month word
  if (NavI18n.lang === 'ar' && typeof iso === 'string') {
    const FR_MO = {
      janvier: 1,
      'janv.': 1,
      février: 2,
      'févr.': 2,
      fevrier: 2,
      mars: 3,
      avril: 4,
      mai: 5,
      juin: 6,
      juillet: 7,
      août: 8,
      aout: 8,
      septembre: 9,
      'sept.': 9,
      octobre: 10,
      'oct.': 10,
      novembre: 11,
      'nov.': 11,
      décembre: 12,
      'déc.': 12,
      decembre: 12
    };
    const parts = iso.trim().split(/\s+/);
    if (parts.length >= 2) {
      const day = parseInt(parts[0], 10);
      const moKey = parts[1].toLowerCase();
      const moIdx = FR_MO[moKey];
      if (!isNaN(day) && moIdx) {
        const year = parts[2] || '';
        return `${day} ${NAV_AR_MONTHS_SHORT[moIdx]}${year ? ' ' + year : ''}`;
      }
    }
  }
  return iso;
}
